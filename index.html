<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>CONTOUR — 測量野帳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:      #0B1014;
    --line:     #7FE3C4;
    --line-dim: rgba(127, 227, 196, 0.42);
    --major:    #C8FBEA;
    --amber:    #E8A24C;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; height: 100dvh; overflow: hidden; background: var(--ink); }
  body { font-family: 'IBM Plex Mono', ui-monospace, monospace; }
  canvas { display: block; touch-action: none; -webkit-user-select: none; user-select: none; }

  /* ---- HUD ---- */
  #hud {
    position: fixed; inset: 0; pointer-events: none;
    opacity: 0; transition: opacity .6s ease .2s;
  }
  #hud.live { opacity: 1; }

  #reticle {
    position: absolute; left: 50%; top: 50%;
    width: 26px; height: 26px; transform: translate(-50%, -50%);
  }
  #reticle::before, #reticle::after {
    content: ''; position: absolute; background: var(--line-dim);
  }
  #reticle::before { left: 50%; top: 0; width: 1px; height: 100%; transform: translateX(-50%); }
  #reticle::after  { top: 50%; left: 0; height: 1px; width: 100%; transform: translateY(-50%); }
  #reticle span {
    position: absolute; left: 50%; top: 50%; width: 7px; height: 7px;
    transform: translate(-50%, -50%); background: var(--ink);
    box-shadow: 0 0 0 1px rgba(127,227,196,.55);
  }

  #survey {
    position: absolute;
    left: calc(28px + env(safe-area-inset-left)); bottom: calc(26px + env(safe-area-inset-bottom));
    color: var(--line); font-size: 11px; font-weight: 300;
    letter-spacing: .09em; line-height: 1.9;
  }
  #survey dl { display: grid; grid-template-columns: auto auto; gap: 0 14px; }
  #survey dt { color: var(--line-dim); }
  #survey dd { text-align: right; font-weight: 600; font-variant-numeric: tabular-nums; }
  #survey dd.up { color: var(--amber); }

  #meta {
    position: absolute;
    right: calc(28px + env(safe-area-inset-right)); bottom: calc(26px + env(safe-area-inset-bottom));
    text-align: right;
    color: var(--line-dim); font-size: 10px; font-weight: 300; letter-spacing: .12em;
    line-height: 2;
  }
  /* on touch, lift the readout clear of the on-screen buttons */
  body.touch #meta { bottom: calc(122px + env(safe-area-inset-bottom)); }
  #meta b { color: var(--line); font-weight: 600; font-variant-numeric: tabular-nums; }

  /* ---- Gate ---- */
  #gate {
    position: fixed; inset: 0; display: grid; place-items: center;
    background: radial-gradient(120% 90% at 50% 108%, #17303a 0%, #0B1014 62%);
    transition: opacity .5s ease, visibility .5s;
  }
  #gate.gone { opacity: 0; visibility: hidden; }
  #card { text-align: center; max-width: 460px; padding: 0 24px; }
  #card h1 {
    font-size: clamp(38px, 9vw, 68px); font-weight: 300; color: var(--major);
    letter-spacing: .34em; margin-right: -.34em; line-height: 1;
  }
  #card .rule {
    height: 1px; margin: 26px auto 22px; width: 100%;
    background: linear-gradient(90deg, transparent, var(--line-dim) 22%, var(--line-dim) 78%, transparent);
  }
  #card p {
    color: var(--line-dim); font-size: 12px; font-weight: 300;
    letter-spacing: .07em; line-height: 2.1;
  }
  #card kbd {
    color: var(--line); font-weight: 600; font-size: 11px;
    border: 1px solid rgba(127,227,196,.28); border-radius: 2px;
    padding: 2px 6px; margin: 0 1px;
  }
  #enter {
    margin-top: 34px; font: inherit; font-size: 11px; font-weight: 600;
    letter-spacing: .22em; color: var(--ink); background: var(--line);
    border: 0; border-radius: 2px; padding: 13px 30px; cursor: pointer;
    transition: background .18s ease, transform .18s ease;
  }
  #enter:hover { background: var(--major); transform: translateY(-1px); }
  #enter:focus-visible { outline: 2px solid var(--amber); outline-offset: 3px; }

  /* ---- login fields ---- */
  #fields { display: grid; gap: 12px; margin-top: 30px; text-align: left; }
  #fields label {
    display: grid; grid-template-columns: 50px 1fr; align-items: center; gap: 12px;
    color: var(--line-dim); font-size: 10px; letter-spacing: .18em;
  }
  #fields input {
    font: inherit; font-size: 13px; font-weight: 400; letter-spacing: .06em;
    color: var(--major); background: rgba(127,227,196,.06);
    border: 1px solid rgba(127,227,196,.24); border-radius: 2px;
    padding: 9px 11px; width: 100%; outline: none;
    transition: border-color .18s ease, background .18s ease;
  }
  #fields input:focus { border-color: var(--line); background: rgba(127,227,196,.10); }
  #fields input::placeholder { color: rgba(127,227,196,.28); }
  #hint { margin-top: 14px !important; font-size: 10px !important; }

  /* ---- network / roster ---- */
  #net {
    position: absolute;
    left: calc(28px + env(safe-area-inset-left)); top: calc(22px + env(safe-area-inset-top));
    color: var(--line-dim); font-size: 10px; font-weight: 300;
    letter-spacing: .12em; line-height: 1.9;
  }
  #net-status b { color: var(--line); font-weight: 600; }
  #net-status.off b { color: var(--amber); }
  #net-list { margin-top: 4px; }
  #net-list div { color: var(--line); font-weight: 400; }
  #net-list div.me { color: var(--major); }

  /* ---- touch controls (mobile) ---- */
  #touch { position: fixed; inset: 0; pointer-events: none; display: none; z-index: 5; }
  body.touch #touch { display: block; }
  #stick {
    position: absolute; width: 108px; height: 108px; margin: -54px 0 0 -54px;
    border: 1px solid rgba(127,227,196,.35); border-radius: 50%;
    background: rgba(127,227,196,.05); display: none;
  }
  #stick.on { display: block; }
  #stick-knob {
    position: absolute; left: 50%; top: 50%; width: 46px; height: 46px;
    margin: -23px 0 0 -23px; border-radius: 50%;
    background: rgba(127,227,196,.22); border: 1px solid rgba(127,227,196,.6);
  }
  .tbtn {
    position: absolute; pointer-events: auto; touch-action: none;
    -webkit-user-select: none; user-select: none;
    display: grid; place-items: center; color: var(--line);
    font-size: 11px; font-weight: 600; letter-spacing: .12em;
    border: 1px solid rgba(127,227,196,.42); border-radius: 50%;
    background: rgba(127,227,196,.08); -webkit-tap-highlight-color: transparent;
  }
  .tbtn:active { background: rgba(127,227,196,.22); }
  #jump {
    right: calc(28px + env(safe-area-inset-right));
    bottom: calc(30px + env(safe-area-inset-bottom));
    width: 76px; height: 76px;
  }
  #view {
    right: calc(116px + env(safe-area-inset-right));
    bottom: calc(41px + env(safe-area-inset-bottom));
    width: 58px; height: 58px; font-size: 10px; letter-spacing: .06em;
  }
  #view.on { color: var(--major); border-color: var(--major); background: rgba(200,251,234,.14); }
  /* third-person: the centre reticle is meaningless, hide it */
  body.tps #reticle { display: none; }

  #loading {
    position: fixed; left: 50%; bottom: 40px; transform: translateX(-50%);
    color: var(--line-dim); font-size: 10px; letter-spacing: .3em;
  }
</style>
</head>
<body>

<div id="hud">
  <div id="reticle"><span></span></div>
  <div id="net">
    <div id="net-status">NET <b>—</b></div>
    <div id="net-list"></div>
  </div>
  <div id="survey">
    <dl>
      <dt>ELEV</dt><dd id="v-elev">—</dd>
      <dt>BRG</dt><dd id="v-brg">—</dd>
      <dt>E</dt><dd id="v-e">—</dd>
      <dt>N</dt><dd id="v-n">—</dd>
    </dl>
  </div>
  <div id="meta">
    <div>WASD 移動 · SHIFT 走る · SPACE 跳ぶ · V 視点 · ESC 解除</div>
    <div>CI 4 m &nbsp;·&nbsp; <b id="v-fps">--</b> FPS</div>
  </div>
</div>

<div id="gate">
  <div id="card">
    <h1>CONTOUR</h1>
    <div class="rule"></div>
    <p>
      等高線だけで描かれた地形の内側を歩く。<br>
      標高 4 m ごとに 1 本、20 m ごとに計曲線。<br>
      水面が 0 m の等高線になる。
    </p>
    <div id="fields">
      <label>NAME <input id="nick" maxlength="16" placeholder="測量士" autocomplete="off" autofocus></label>
      <label>ROOM <input id="room" maxlength="24" placeholder="lobby" autocomplete="off"></label>
    </div>
    <p id="hint">同じ ROOM 名の仲間と、同じ地形を一緒に歩けます。</p>
    <button id="enter">ゲームスタート</button>
  </div>
</div>
<div id="touch">
  <div id="stick"><div id="stick-knob"></div></div>
  <div id="view" class="tbtn">視点</div>
  <div id="jump" class="tbtn">JUMP</div>
</div>
<div id="loading">GENERATING TERRAIN</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mqtt@5/dist/mqtt.min.js"></script>
<script>
(() => {
  'use strict';

  // ──────────────────────────────────────────────────────────
  //  Palette
  // ──────────────────────────────────────────────────────────
  const C = {
    horizon: new THREE.Color(0x2E4A54),
    zenith:  new THREE.Color(0x080C11),
    sun:     new THREE.Color(0xE8A24C),
    low:     new THREE.Color(0x101C23),
    high:    new THREE.Color(0x3B505A),
    line:    new THREE.Color(0x7FE3C4),
    major:   new THREE.Color(0xC8FBEA),
    rock:    new THREE.Color(0x0C141A),
    water:   new THREE.Color(0x14313B),
  };
  const FOG_DENSITY = 0.0092;
  const SUN_DIR = new THREE.Vector3(0.62, 0.085, -0.78).normalize();

  const WORLD = 700;      // metres across
  const SEGS  = 360;      // grid resolution
  const CI    = 4;        // contour interval (m)

  // ──────────────────────────────────────────────────────────
  //  Terrain field  — value noise fBm
  // ──────────────────────────────────────────────────────────
  const hash = (x, y) => {
    const s = Math.sin(x * 127.1 + y * 311.7) * 43758.5453123;
    return s - Math.floor(s);
  };
  const noise = (x, y) => {
    const xi = Math.floor(x), yi = Math.floor(y);
    const xf = x - xi, yf = y - yi;
    const u = xf * xf * (3 - 2 * xf);
    const v = yf * yf * (3 - 2 * yf);
    const a = hash(xi, yi),     b = hash(xi + 1, yi);
    const c = hash(xi, yi + 1), d = hash(xi + 1, yi + 1);
    return a * (1 - u) * (1 - v) + b * u * (1 - v) + c * (1 - u) * v + d * u * v;
  };
  const fbm = (x, y, oct) => {
    let t = 0, amp = 1, frq = 1, max = 0;
    for (let i = 0; i < oct; i++) {
      t += noise(x * frq, y * frq) * amp;
      max += amp; amp *= 0.5; frq *= 2;
    }
    return t / max;
  };
  function height(x, z) {
    const macro  = fbm(x * 0.0018, z * 0.0018, 5);
    const meso   = fbm(x * 0.0090 + 71, z * 0.0090 + 71, 4);
    const micro  = fbm(x * 0.0460 + 13, z * 0.0460 + 13, 3);
    let h = (macro + meso * 0.24 + micro * 0.035) / 1.275;
    h = Math.pow(h, 1.85);
    return h * 96 - 19;
  }

  // ──────────────────────────────────────────────────────────
  //  Scene
  // ──────────────────────────────────────────────────────────
  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(C.horizon.getHex(), FOG_DENSITY);

  const camera = new THREE.PerspectiveCamera(72, innerWidth / innerHeight, 0.1, 1400);
  camera.rotation.order = 'YXZ';

  const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.setClearColor(C.zenith);
  document.body.appendChild(renderer.domElement);

  // ---- sky dome ----
  const sky = new THREE.Mesh(
    new THREE.SphereGeometry(1200, 32, 20),
    new THREE.ShaderMaterial({
      side: THREE.BackSide, depthWrite: false,
      uniforms: {
        uZenith:  { value: C.zenith },
        uHorizon: { value: C.horizon },
        uSun:     { value: C.sun },
        uSunDir:  { value: SUN_DIR },
      },
      vertexShader: `
        varying vec3 vDir;
        void main() {
          vDir = position;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }`,
      fragmentShader: `
        uniform vec3 uZenith, uHorizon, uSun, uSunDir;
        varying vec3 vDir;
        void main() {
          vec3 d = normalize(vDir);
          float t = clamp(d.y * 0.5 + 0.5, 0.0, 1.0);
          vec3 col = mix(uHorizon, uZenith, smoothstep(0.50, 0.88, t));
          col = mix(col, uHorizon * 0.72, smoothstep(0.50, 0.30, t));
          float a = max(dot(d, uSunDir), 0.0);
          col += uSun * (pow(a, 220.0) * 1.6 + pow(a, 6.0) * 0.20);
          gl_FragColor = vec4(col, 1.0);
        }`
    })
  );
  scene.add(sky);

  // ──────────────────────────────────────────────────────────
  //  Terrain — the signature: elevation read as contour lines
  // ──────────────────────────────────────────────────────────
  const geo = new THREE.PlaneGeometry(WORLD, WORLD, SEGS, SEGS);
  geo.rotateX(-Math.PI / 2);
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    pos.setY(i, height(pos.getX(i), pos.getZ(i)));
  }
  geo.computeVertexNormals();

  const terrainMat = new THREE.ShaderMaterial({
    extensions: { derivatives: true },
    uniforms: {
      uLow:      { value: C.low },
      uHigh:     { value: C.high },
      uLine:     { value: C.line },
      uMajor:    { value: C.major },
      uSunCol:   { value: C.sun },
      uSunDir:   { value: SUN_DIR },
      uFogCol:   { value: C.horizon },
      uFogDens:  { value: FOG_DENSITY },
      uCI:       { value: CI },
    },
    vertexShader: `
      varying float vH;
      varying vec3  vN;
      varying float vFog;
      void main() {
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vH = wp.y;
        vN = normalize(mat3(modelMatrix) * normal);
        vec4 mv = viewMatrix * wp;
        vFog = -mv.z;
        gl_Position = projectionMatrix * mv;
      }`,
    fragmentShader: `
      uniform vec3  uLow, uHigh, uLine, uMajor, uSunCol, uSunDir, uFogCol;
      uniform float uFogDens, uCI;
      varying float vH;
      varying vec3  vN;
      varying float vFog;

      float band(float h, float interval) {
        float d  = h / interval;
        float f  = abs(fract(d - 0.5) - 0.5);
        float w  = fwidth(d) * 1.1;
        return 1.0 - smoothstep(0.0, w, f);
      }

      void main() {
        vec3 n = normalize(vN);

        // base: elevation ramp + grazing sun on slopes
        vec3 base = mix(uLow, uHigh, smoothstep(-16.0, 74.0, vH));
        float ndl = max(dot(n, uSunDir), 0.0);
        vec3 col  = base * (0.30 + 0.95 * ndl) + uSunCol * pow(ndl, 3.0) * 0.10;

        // contours fade out with distance so they never shimmer
        float fade = 1.0 - smoothstep(70.0, 250.0, vFog);
        // and fade on near-vertical faces, where an isoline means nothing
        fade *= smoothstep(0.10, 0.42, n.y);

        float minor = band(vH, uCI);
        float major = band(vH, uCI * 5.0);
        col = mix(col, uLine,  minor * 0.50 * fade);
        col = mix(col, uMajor, major * 0.92 * fade);

        float f = 1.0 - exp(-uFogDens * uFogDens * vFog * vFog);
        gl_FragColor = vec4(mix(col, uFogCol, clamp(f, 0.0, 1.0)), 1.0);
      }`
  });
  scene.add(new THREE.Mesh(geo, terrainMat));

  // ---- water = the 0 m contour, filled ----
  const water = new THREE.Mesh(
    new THREE.PlaneGeometry(WORLD * 1.6, WORLD * 1.6),
    new THREE.MeshBasicMaterial({ color: C.water, transparent: true, opacity: 0.9, fog: true })
  );
  water.rotation.x = -Math.PI / 2;
  water.position.y = 0;
  scene.add(water);

  // ---- outcrops: silhouettes only, for parallax and scale ----
  const light = new THREE.DirectionalLight(0xffd7a0, 1.15);
  light.position.copy(SUN_DIR).multiplyScalar(100);
  scene.add(light, new THREE.HemisphereLight(0x35525e, 0x070b0e, 0.55));

  // seeded RNG so every player sees the same outcrops in the shared world
  const mulberry32 = (a) => () => {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
  const rrand = mulberry32(0x5EEDBEEF);

  const rockGeo = new THREE.IcosahedronGeometry(1, 0);
  const rocks = new THREE.InstancedMesh(
    rockGeo, new THREE.MeshLambertMaterial({ color: C.rock, flatShading: true }), 150
  );
  const m4 = new THREE.Matrix4(), q = new THREE.Quaternion(), e = new THREE.Euler();
  const vPos = new THREE.Vector3(), vScl = new THREE.Vector3();
  let placed = 0, guard = 0;
  while (placed < 150 && guard++ < 6000) {
    const x = (rrand() - 0.5) * WORLD * 0.94;
    const z = (rrand() - 0.5) * WORLD * 0.94;
    const y = height(x, z);
    if (y < 4) continue;
    const s = 2.2 + rrand() * 9;
    vPos.set(x, y + s * 0.32, z);
    vScl.set(s * (0.7 + rrand() * 0.8), s * (1.1 + rrand() * 1.9), s * (0.7 + rrand() * 0.8));
    e.set(rrand() * 0.5, rrand() * 6.3, rrand() * 0.5);
    rocks.setMatrixAt(placed++, m4.compose(vPos, q.setFromEuler(e), vScl));
  }
  rocks.count = placed;
  scene.add(rocks);

  // ──────────────────────────────────────────────────────────
  //  First-person controller
  // ──────────────────────────────────────────────────────────
  const EYE = 1.68, GRAV = 26, JUMP = 8.4, WALK = 5.4, RUN = 10.2;
  const p = new THREE.Vector3(0, 0, 0);
  let yaw = 0, pitch = -0.04, vy = 0, grounded = false, bob = 0;
  const keys = Object.create(null);
  let wantJump = false;
  const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

  // touch-capable device? (phones / tablets) → show on-screen controls
  const isTouch = matchMedia('(pointer: coarse)').matches ||
                  ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  const touchMove = { active: false, x: 0, y: 0, run: false };  // x=strafe, y=forward

  // drop the player somewhere above water with a view
  for (let i = 0; i < 400; i++) {
    const x = (Math.random() - 0.5) * WORLD * 0.6;
    const z = (Math.random() - 0.5) * WORLD * 0.6;
    const y = height(x, z);
    if (y > 6 && y < 40) { p.set(x, y + EYE, z); break; }
  }

  const canvas = renderer.domElement;
  const gate = document.getElementById('gate');
  const hud  = document.getElementById('hud');

  const grab = () => canvas.requestPointerLock();
  const nickEl = document.getElementById('nick');
  const roomEl = document.getElementById('room');

  // restore last-used name / room
  try {
    const sn = localStorage.getItem('contour.nick'); if (sn) nickEl.value = sn;
    const sr = localStorage.getItem('contour.room'); if (sr) roomEl.value = sr;
  } catch (e) {}

  // Start the game. Crucially this does NOT depend on Pointer Lock — the
  // world reveals immediately, so it works even where lock is unavailable
  // (mobile, embedded viewers). Mouse-look is layered on top for desktop.
  function startGame() {
    if (MP.playing) { if (!isTouch) grab(); return; }
    MP.name = (nickEl.value || '').trim().slice(0, 16) || ('測量士-' + MP.id.slice(1, 4));
    MP.room = (roomEl.value || '').trim().slice(0, 24) || 'lobby';
    try {
      localStorage.setItem('contour.nick', MP.name);
      localStorage.setItem('contour.room', MP.room);
    } catch (e) {}
    MP.playing = true;
    gate.classList.add('gone');
    hud.classList.add('live');
    document.body.classList.toggle('touch', isTouch);
    if (!selfAvatar) {                       // your own avatar, shown in third-person
      selfAvatar = makeAvatar(MP.name);
      if (selfAvatar.userData.tag) selfAvatar.userData.tag.visible = false; // hide own nameplate
      selfAvatar.visible = tps;
      scene.add(selfAvatar);
    }
    if (isTouch) {                     // mobile: swap the help line for touch verbs
      const meta = document.querySelector('#meta div');
      if (meta) meta.textContent = '左 移動 · 右 ドラッグ 視点 · JUMP · 視点 で三人称';
    }
    connectMP();
    if (!isTouch) grab();              // desktop: capture the mouse for looking
  }

  document.getElementById('enter').addEventListener('click', startGame);
  nickEl.addEventListener('keydown', (ev) => { if (ev.key === 'Enter') startGame(); });
  roomEl.addEventListener('keydown', (ev) => { if (ev.key === 'Enter') startGame(); });
  canvas.addEventListener('click', () => {
    if (isTouch || document.pointerLockElement) return;
    MP.playing ? grab() : startGame();   // desktop: re-capture mouse after Esc
  });

  document.addEventListener('pointerlockchange', () => {
    if (document.pointerLockElement !== canvas) for (const k in keys) keys[k] = false;
  });
  addEventListener('mousemove', (ev) => {
    if (document.pointerLockElement !== canvas) return;
    yaw   -= ev.movementX * 0.0021;
    pitch -= ev.movementY * 0.0021;
    pitch = Math.max(-1.55, Math.min(1.55, pitch));
  });

  // ---- touch controls: floating joystick (move) + drag (look) + JUMP ----
  const stickEl = document.getElementById('stick');
  const knobEl  = document.getElementById('stick-knob');
  const jumpEl  = document.getElementById('jump');
  const viewEl  = document.getElementById('view');
  const STICK_R = 46, LOOK_SENS = 0.0042;
  let moveTid = null, lookTid = null, lookX = 0, lookY = 0;

  // view mode: false = first-person, true = third-person (see your own avatar)
  let tps = false, selfAvatar = null;
  function toggleView() {
    tps = !tps;
    document.body.classList.toggle('tps', tps);
    viewEl.classList.toggle('on', tps);
    if (selfAvatar) selfAvatar.visible = tps;
  }

  function beginMove(t) {
    moveTid = t.identifier;
    stickEl.style.left = t.clientX + 'px';
    stickEl.style.top  = t.clientY + 'px';
    stickEl.classList.add('on');
    knobEl.style.transform = 'translate(0px,0px)';
    touchMove.active = true; touchMove.x = 0; touchMove.y = 0; touchMove.run = false;
  }
  function updateMove(t) {
    let dx = t.clientX - parseFloat(stickEl.style.left);
    let dy = t.clientY - parseFloat(stickEl.style.top);
    const len = Math.hypot(dx, dy) || 1;
    const cl = Math.min(len, STICK_R);
    const kx = dx / len * cl, ky = dy / len * cl;
    knobEl.style.transform = 'translate(' + kx + 'px,' + ky + 'px)';
    touchMove.x = Math.max(-1, Math.min(1, dx / STICK_R));
    touchMove.y = Math.max(-1, Math.min(1, -dy / STICK_R));   // up = forward
    touchMove.run = (len / STICK_R) > 0.72;                    // push far to run
  }
  function endMove() {
    moveTid = null; stickEl.classList.remove('on');
    touchMove.active = false; touchMove.x = 0; touchMove.y = 0; touchMove.run = false;
  }

  addEventListener('touchstart', (ev) => {
    if (!MP.playing) return;
    for (const t of ev.changedTouches) {
      if (t.target && t.target.closest && t.target.closest('.tbtn')) continue; // buttons handle themselves
      if (moveTid === null && t.clientX < innerWidth * 0.5) beginMove(t);
      else if (lookTid === null) { lookTid = t.identifier; lookX = t.clientX; lookY = t.clientY; }
    }
  }, { passive: true });

  addEventListener('touchmove', (ev) => {
    if (!MP.playing) return;
    let handled = false;
    for (const t of ev.changedTouches) {
      if (t.identifier === moveTid) { updateMove(t); handled = true; }
      else if (t.identifier === lookTid) {
        yaw   -= (t.clientX - lookX) * LOOK_SENS;
        pitch -= (t.clientY - lookY) * LOOK_SENS;
        pitch = Math.max(-1.55, Math.min(1.55, pitch));
        lookX = t.clientX; lookY = t.clientY; handled = true;
      }
    }
    if (handled) ev.preventDefault();
  }, { passive: false });

  function endTouch(ev) {
    for (const t of ev.changedTouches) {
      if (t.identifier === moveTid) endMove();
      else if (t.identifier === lookTid) lookTid = null;
    }
  }
  addEventListener('touchend', endTouch);
  addEventListener('touchcancel', endTouch);

  jumpEl.addEventListener('touchstart', (ev) => { ev.preventDefault(); wantJump = true; }, { passive: false });
  const onViewTap = (ev) => { ev.preventDefault(); toggleView(); };
  viewEl.addEventListener('touchstart', onViewTap, { passive: false });
  viewEl.addEventListener('click', onViewTap);

  addEventListener('keydown', (ev) => {
    keys[ev.code] = true;
    if (ev.code === 'Space') ev.preventDefault();
    if (ev.code === 'KeyV' && !ev.repeat) toggleView();
  });
  addEventListener('keyup', (ev) => { keys[ev.code] = false; });

  // keep the render size locked to the visible viewport, including after an
  // orientation flip (mobile fires this late, so re-apply on a short delay)
  function onResize() {
    const w = window.innerWidth, h = window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  }
  addEventListener('resize', onResize);
  addEventListener('orientationchange', () => { onResize(); setTimeout(onResize, 250); setTimeout(onResize, 600); });
  if (window.visualViewport) visualViewport.addEventListener('resize', onResize);

  // ──────────────────────────────────────────────────────────
  //  Multiplayer — shared world over a public MQTT broker.
  //  No backend: players pub/sub their position on a room topic,
  //  so friends who pick the same ROOM meet in the same terrain.
  // ──────────────────────────────────────────────────────────
  const MP = {
    id: 'p' + Math.random().toString(36).slice(2, 9),
    name: '', room: 'lobby',
    client: null, connected: false, started: false, playing: false,
    peers: new Map(),          // id -> { name, group, cur, tgt, yaw, tgtYaw, lastSeen }
    lastPub: 0,
    PUB_MS: 70,                 // ~14 broadcasts / second
    TIMEOUT: 6000,             // forget a peer unheard-of for 6 s
    BROKER: 'wss://broker.emqx.io:8084/mqtt',
  };

  const netStatus = document.getElementById('net-status');
  const netList   = document.getElementById('net-list');
  const esc = (s) => String(s).replace(/[&<>"]/g,
    (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

  function setNet(text, off) {
    netStatus.innerHTML = 'NET <b>' + esc(text) + '</b>';
    netStatus.className = off ? 'off' : '';
  }
  function topic(sub) { return 'contour/' + encodeURIComponent(MP.room) + '/' + sub; }

  function renderRoster() {
    const rows = ['<div class="me">' + esc(MP.name || '—') + ' (you)</div>'];
    for (const peer of MP.peers.values()) rows.push('<div>' + esc(peer.name || '匿名') + '</div>');
    netList.innerHTML = rows.join('');
    setNet((MP.connected ? 'ONLINE' : 'SOLO') + ' · ' + (MP.peers.size + 1), !MP.connected);
  }

  // floating nameplate as a billboard sprite
  function nameSprite(name) {
    const fs = 30, pad = 9;
    const cv = document.createElement('canvas');
    const ctx = cv.getContext('2d');
    ctx.font = '600 ' + fs + 'px "IBM Plex Mono", monospace';
    const w = Math.ceil(ctx.measureText(name).width) + pad * 2;
    const h = fs + pad * 2;
    cv.width = w; cv.height = h;
    ctx.font = '600 ' + fs + 'px "IBM Plex Mono", monospace';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(11,16,20,0.62)';
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#C8FBEA';
    ctx.fillText(name, pad, h / 2 + 1);
    const tex = new THREE.CanvasTexture(cv);
    tex.minFilter = THREE.LinearFilter;
    const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: true, fog: false }));
    spr.scale.set(w / h * 1.15, 1.15, 1);
    spr.position.y = 2.55;
    spr.renderOrder = 4;
    return spr;
  }

  function makeAvatar(name) {
    const g = new THREE.Group();
    const amber = new THREE.MeshBasicMaterial({ color: C.sun, fog: true });
    const cyan  = new THREE.MeshBasicMaterial({ color: C.line, fog: true, transparent: true, opacity: 0.9 });
    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.30, 1.25, 8), amber);
    body.position.y = 0.95; g.add(body);
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.24, 12, 10), amber);
    head.position.y = 1.78; g.add(head);
    const ring = new THREE.Mesh(new THREE.RingGeometry(0.5, 0.62, 28), cyan);
    ring.rotation.x = -Math.PI / 2; ring.position.y = 0.05; g.add(ring);
    const pip = new THREE.Mesh(new THREE.ConeGeometry(0.13, 0.34, 8), cyan);
    pip.rotation.x = Math.PI / 2; pip.position.set(0, 0.95, 0.42); g.add(pip);
    const tag = nameSprite(name);
    g.add(tag); g.userData.tag = tag;
    return g;
  }

  function setTag(peer, name) {
    const old = peer.group.userData.tag;
    peer.group.remove(old);
    old.material.map.dispose(); old.material.dispose();
    const tag = nameSprite(name);
    peer.group.add(tag); peer.group.userData.tag = tag;
  }

  function upsertPeer(s) {
    let peer = MP.peers.get(s.id);
    if (!peer) {
      const group = makeAvatar(s.n || '匿名');
      group.position.set(s.x, s.y, s.z);
      group.rotation.y = s.r || 0;
      scene.add(group);
      peer = {
        name: s.n || '匿名', group,
        cur: new THREE.Vector3(s.x, s.y, s.z),
        tgt: new THREE.Vector3(s.x, s.y, s.z),
        yaw: s.r || 0, tgtYaw: s.r || 0,
        lastSeen: performance.now(),
      };
      MP.peers.set(s.id, peer);
      renderRoster();
    }
    peer.tgt.set(s.x, s.y, s.z);
    peer.tgtYaw = s.r || 0;
    peer.lastSeen = performance.now();
    if (s.n && s.n !== peer.name) { peer.name = s.n; setTag(peer, s.n); renderRoster(); }
  }

  function dropPeer(id) {
    const peer = MP.peers.get(id);
    if (!peer) return;
    scene.remove(peer.group);
    peer.group.traverse((o) => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) { if (o.material.map) o.material.map.dispose(); o.material.dispose(); }
    });
    MP.peers.delete(id);
    renderRoster();
  }

  function connectMP() {
    if (MP.started) return;
    MP.started = true;
    renderRoster();
    if (typeof mqtt === 'undefined') { setNet('SOLO', true); return; }   // CDN blocked → play alone

    setNet('CONNECTING…', true);
    let client;
    try {
      client = mqtt.connect(MP.BROKER, {
        clientId: 'contour_' + MP.id,
        clean: true, reconnectPeriod: 3000, connectTimeout: 9000, keepalive: 30,
        will: { topic: topic('leave'), payload: JSON.stringify({ id: MP.id }), qos: 0 },
      });
    } catch (err) { setNet('SOLO', true); return; }
    MP.client = client;

    client.on('connect', () => {
      MP.connected = true;
      client.subscribe(topic('state/+'));
      client.subscribe(topic('leave'));
      publishState(true);
      renderRoster();
    });
    client.on('reconnect', () => setNet('RECONNECTING…', true));
    client.on('close', () => { MP.connected = false; renderRoster(); });
    client.on('error', () => {});
    client.on('message', (t, buf) => {
      let msg; try { msg = JSON.parse(buf.toString()); } catch (e) { return; }
      if (!msg || !msg.id) return;
      if (t.slice(-6) === '/leave') { dropPeer(msg.id); return; }
      if (msg.id === MP.id) return;
      upsertPeer(msg);
    });

    addEventListener('beforeunload', () => {
      try { client.publish(topic('leave'), JSON.stringify({ id: MP.id })); client.end(true); } catch (e) {}
    });
  }

  function publishState(force) {
    if (!MP.connected || !MP.client) return;
    const now = performance.now();
    if (!force && now - MP.lastPub < MP.PUB_MS) return;
    MP.lastPub = now;
    MP.client.publish(topic('state/' + MP.id), JSON.stringify({
      id: MP.id, n: MP.name,
      x: +p.x.toFixed(2), y: +(p.y - EYE).toFixed(2), z: +p.z.toFixed(2),
      r: +yaw.toFixed(3),
    }));
  }

  function updatePeers(dt) {
    const now = performance.now();
    const k = 1 - Math.exp(-dt * 9);
    for (const [id, peer] of MP.peers) {
      if (now - peer.lastSeen > MP.TIMEOUT) { dropPeer(id); continue; }
      peer.cur.lerp(peer.tgt, k);
      peer.group.position.copy(peer.cur);
      let d = (peer.tgtYaw - peer.yaw) % (Math.PI * 2);
      if (d > Math.PI) d -= Math.PI * 2;
      if (d < -Math.PI) d += Math.PI * 2;
      peer.yaw += d * k;
      peer.group.rotation.y = peer.yaw;
    }
  }

  // ──────────────────────────────────────────────────────────
  //  Loop
  // ──────────────────────────────────────────────────────────
  const $ = (id) => document.getElementById(id);
  const fwd = new THREE.Vector3(), rgt = new THREE.Vector3(), mv = new THREE.Vector3();
  const _look = new THREE.Vector3(), _tgt = new THREE.Vector3(), _cam = new THREE.Vector3();
  let last = performance.now(), fpsT = 0, fpsN = 0;

  function frame(now) {
    requestAnimationFrame(frame);
    const dt = Math.min((now - last) / 1000, 0.05);
    last = now;

    // --- move ---
    const running = keys['ShiftLeft'] || keys['ShiftRight'] || touchMove.run;
    const speed = running ? RUN : WALK;
    fwd.set(-Math.sin(yaw), 0, -Math.cos(yaw));
    rgt.set(Math.cos(yaw), 0, -Math.sin(yaw));
    mv.set(0, 0, 0);
    if (keys['KeyW'] || keys['ArrowUp'])    mv.add(fwd);
    if (keys['KeyS'] || keys['ArrowDown'])  mv.sub(fwd);
    if (keys['KeyD'] || keys['ArrowRight']) mv.add(rgt);
    if (keys['KeyA'] || keys['ArrowLeft'])  mv.sub(rgt);
    if (touchMove.active) { mv.addScaledVector(fwd, touchMove.y); mv.addScaledVector(rgt, touchMove.x); }

    const moving = mv.lengthSq() > 0;
    if (moving) {
      mv.normalize().multiplyScalar(speed * dt);
      p.x += mv.x; p.z += mv.z;
      const lim = WORLD * 0.48;
      p.x = Math.max(-lim, Math.min(lim, p.x));
      p.z = Math.max(-lim, Math.min(lim, p.z));
    }

    // --- gravity + ground ---
    vy -= GRAV * dt;
    p.y += vy * dt;
    const floor = height(p.x, p.z) + EYE;
    if (p.y <= floor) { p.y = floor; vy = 0; grounded = true; }
    else grounded = false;
    if (grounded && (keys['Space'] || wantJump)) { vy = JUMP; grounded = false; }
    wantJump = false;

    // --- head bob: the only thing selling the walk ---
    let bobY = 0, roll = 0;
    if (!reduceMotion) {
      if (moving && grounded) bob += dt * (running ? 15.5 : 9.4);
      else bob += dt * 1.2;
      const amt = moving && grounded ? (running ? 1 : 0.62) : 0.09;
      bobY = Math.sin(bob * 2) * 0.052 * amt;
      roll = Math.sin(bob) * 0.0075 * amt;
    }

    // --- camera: first- or third-person ---
    if (tps) {
      const cp = Math.cos(pitch), sp = Math.sin(pitch);
      _look.set(-Math.sin(yaw) * cp, sp, -Math.cos(yaw) * cp);     // gaze direction
      _tgt.set(p.x, p.y + 0.1, p.z);                               // orbit around the head
      _cam.copy(_tgt).addScaledVector(_look, -4.6);                // pull the camera back
      _cam.y += 0.6;
      const gy = height(_cam.x, _cam.z) + 0.5;                     // stay above the terrain
      if (_cam.y < gy) _cam.y = gy;
      camera.position.copy(_cam);
      camera.lookAt(_tgt);
      if (selfAvatar) {
        selfAvatar.position.set(p.x, p.y - EYE, p.z);
        selfAvatar.rotation.y = yaw + Math.PI;                     // face where you're looking
      }
    } else {
      camera.position.set(p.x, p.y + bobY, p.z);
      camera.rotation.set(pitch, yaw, roll, 'YXZ');
    }
    sky.position.set(p.x, 0, p.z);
    water.position.set(p.x, 0, p.z);

    // --- multiplayer: broadcast self, advance others ---
    updatePeers(dt);
    publishState(false);

    renderer.render(scene, camera);

    // --- survey readout ---
    fpsN++; fpsT += dt;
    if (fpsT >= 0.4) {
      const elev = p.y - EYE;
      $('v-elev').textContent = elev.toFixed(1) + ' m';
      $('v-elev').className = elev > 45 ? 'up' : '';
      let brg = (-yaw * 180 / Math.PI) % 360; if (brg < 0) brg += 360;
      $('v-brg').textContent = brg.toFixed(0).padStart(3, '0') + '°';
      $('v-e').textContent = p.x.toFixed(0);
      $('v-n').textContent = (-p.z).toFixed(0);
      $('v-fps').textContent = Math.round(fpsN / fpsT);
      fpsN = 0; fpsT = 0;
    }
  }

  document.getElementById('loading').remove();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
